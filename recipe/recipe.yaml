schema_version: 1

context:
  name: pymatting
  version: 1.1.15

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 67cbadd68d04696357461ad1861bcb3c2adc9ec5fcd38d524db606addabe745a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=45
    - wheel
  run:
    - python >=${{ python_min }}
    - numba >=0.60.0
    - numpy >=1.16.0
    - pillow >=5.2.0
    - scipy >=1.1.0

tests:
  - python:
      imports:
        - pymatting
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python package for alpha matting.
  license: MIT
  # PR made upstream to bundle in LICENSE
  license_file: LICENSE.md
  homepage: https://pymatting.github.io
  repository: https://github.com/pymatting/pymatting

extra:
  recipe-maintainers:
    - '99991'
    - tuelwer
    - thewchan
